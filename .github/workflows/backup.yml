name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups
          FILENAME="backups/backup-$(date -u +%Y-%m-%d).sql.gz"
          pg_dump "$SUPABASE_DB_URL" \
            --no-owner \
            --no-acl \
            --schema=public \
            --schema=auth \
            | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> "$GITHUB_ENV"

      - name: Rotate — keep 30 most recent backups
        run: |
          COUNT=$(ls -1 backups/backup-*.sql.gz 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 30 ]; then
            ls -1 backups/backup-*.sql.gz | sort | head -n -30 | xargs rm -f
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: db backup $(date -u +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
